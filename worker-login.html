<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PGUSA Documents - Worker Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1f3a 0%, #2d3561 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 450px;
            width: 100%;
            padding: 40px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .logo .blue {
            color: #2563eb;
        }
        
        .subtitle {
            color: #64748b;
            font-size: 14px;
            margin-top: 4px;
        }
        
        .error-box {
            background: #fee2e2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 20px;
            color: #991b1b;
            font-size: 14px;
            display: none;
            word-break: break-word;
            max-height: 100px;
            overflow-y: auto;
        }
        
        .error-box.show {
            display: block;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #1e293b;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .btn {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #2563eb;
            color: white;
            width: 100%;
        }
        
        .btn-primary:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .btn-primary.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: #f1f5f9;
            color: #1e293b;
            border: 1px solid #e2e8f0;
        }
        
        .btn-secondary:hover {
            background: #e2e8f0;
        }
        
        .form-footer {
            text-align: center;
            color: #64748b;
            font-size: 14px;
        }
        
        .form-footer a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
        }
        
        .form-footer a:hover {
            text-decoration: underline;
        }
        
        .loading-spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        
        .btn-primary.loading .loading-spinner {
            display: inline-block;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">PGUSA <span class="blue">Documents</span></div>
            <div class="subtitle">Worker Portal</div>
        </div>
        
        <div class="error-box" id="errorBox"></div>
        
        <div class="button-group" style="margin-bottom: 30px;">
            <button class="btn btn-secondary" onclick="toggleForm('signin')">Sign In</button>
            <button class="btn btn-secondary" onclick="toggleForm('apply')">Apply Now</button>
        </div>
        
        <form id="signinForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="your@email.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary" id="signinBtn">
                <span class="loading-spinner"></span>
                Sign In →
            </button>
        </form>
        
        <form id="applyForm" style="display: none;">
            <div class="form-group">
                <label for="applyName">Full Name</label>
                <input type="text" id="applyName" name="name" placeholder="John Doe" required>
            </div>
            
            <div class="form-group">
                <label for="applyEmail">Email Address</label>
                <input type="email" id="applyEmail" name="email" placeholder="your@email.com" required>
            </div>
            
            <div class="form-group">
                <label for="applyPhone">Phone Number</label>
                <input type="tel" id="applyPhone" name="phone" placeholder="(555) 123-4567" required>
            </div>
            
            <button type="submit" class="btn btn-primary" id="applyBtn">
                <span class="loading-spinner"></span>
                Apply Now →
            </button>
        </form>
        
        <div class="form-footer" style="margin-top: 20px;">
            Need help? <a href="javascript:void(0)" onclick="showSupport()">Contact support</a>
        </div>
    </div>
    
    <script>
        // FIXED ERROR HANDLING - No more [object Object]
        
        const errorBox = document.getElementById('errorBox');
        
        // Helper function to safely extract error message
        function getErrorMessage(error) {
            // Handle null/undefined
            if (!error) {
                return 'An unknown error occurred. Please try again.';
            }
            
            // If error is a string, return it
            if (typeof error === 'string') {
                return error;
            }
            
            // If error is an Error object, use .message
            if (error?.message) {
                return error.message;
            }
            
            // If error is an object with error property
            if (error?.error?.message) {
                return error.error.message;
            }
            
            // If error is an object with details
            if (error?.details) {
                return error.details;
            }
            
            // Last resort: try to stringify and clean up
            const str = String(error);
            if (str && str !== '[object Object]') {
                return str;
            }
            
            return 'An unexpected error occurred. Please try again.';
        }
        
        // Display error message
        function showError(error) {
            const message = getErrorMessage(error);
            errorBox.textContent = message;
            errorBox.classList.add('show');
            console.error('Login error:', error); // Log for debugging
        }
        
        // Clear error message
        function clearError() {
            errorBox.textContent = '';
            errorBox.classList.remove('show');
        }
        
        // Toggle between sign in and apply forms
        function toggleForm(form) {
            const signinForm = document.getElementById('signinForm');
            const applyForm = document.getElementById('applyForm');
            
            if (form === 'signin') {
                signinForm.style.display = 'block';
                applyForm.style.display = 'none';
            } else {
                signinForm.style.display = 'none';
                applyForm.style.display = 'block';
            }
            clearError();
        }
        
        // Handle sign in
        document.getElementById('signinForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            clearError();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('signinBtn');
            
            try {
                btn.disabled = true;
                btn.classList.add('loading');
                
                const response = await fetch('/api/workers/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    // Handle API error response
                    throw new Error(data?.message || `Login failed (${response.status})`);
                }
                
                // Success - redirect to dashboard
                window.location.href = '/workers/dashboard';
                
            } catch (error) {
                // FIXED: Now shows actual error message instead of [object Object]
                showError(error);
            } finally {
                btn.disabled = false;
                btn.classList.remove('loading');
            }
        });
        
        // Handle apply
        document.getElementById('applyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            clearError();
            
            const name = document.getElementById('applyName').value;
            const email = document.getElementById('applyEmail').value;
            const phone = document.getElementById('applyPhone').value;
            const btn = document.getElementById('applyBtn');
            
            try {
                btn.disabled = true;
                btn.classList.add('loading');
                
                const response = await fetch('/api/workers/apply', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ name, email, phone })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data?.message || `Application failed (${response.status})`);
                }
                
                // Success - show confirmation
                showError('✓ Application submitted! Check your email for next steps.');
                document.getElementById('applyForm').reset();
                
            } catch (error) {
                // FIXED: Now shows actual error message instead of [object Object]
                showError(error);
            } finally {
                btn.disabled = false;
                btn.classList.remove('loading');
            }
        });
        
        // Support contact
        function showSupport() {
            const email = 'support@propertygroupofusa.com';
            alert(`Email us at: ${email}\n\nOr call: +1-210-XXX-XXXX\n\nHours: 9 AM - 5 PM CT, Mon-Fri`);
        }
    </script>
</body>
</html>
